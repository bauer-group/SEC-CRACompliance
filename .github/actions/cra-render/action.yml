# =============================================================================
# CRA Render Action (JSON → PDF)
# =============================================================================
# Renders machine-readable CRA compliance artifacts (JSON) into professional
# PDF documents with BAUER GROUP corporate design.
#
# Uses Python + WeasyPrint for lightweight, high-quality PDF rendering.
# No headless browser required — ~50MB install vs ~400MB Chromium.
#
# Usage:
#   - uses: bauer-group/SEC-CRACompliance/.github/actions/cra-render@main
#     with:
#       eu-doc-path: eu-doc.json
#       compliance-report-path: cra-compliance-report.json
#
# CRA References: Art. 28 (DoC), Annex V (DoC format), Annex VII (tech docs)
# =============================================================================

name: '🖨️ CRA Render (JSON → PDF)'
description: 'Render CRA compliance artifacts to professional PDF documents'

inputs:
  eu-doc-path:
    description: 'Path to EU DoC JSON file'
    required: false
    default: ''
  compliance-report-path:
    description: 'Path to CRA compliance report JSON file'
    required: false
    default: ''
  output-dir:
    description: 'Output directory for rendered PDFs'
    required: false
    default: 'cra-rendered'
  product-name:
    description: 'Product name (used in PDF filenames, auto-detected if empty)'
    required: false
    default: ''
  product-version:
    description: 'Product version (used in PDF filenames, auto-detected if empty)'
    required: false
    default: ''

outputs:
  eu-doc-pdf-path:
    description: 'Path to rendered EU DoC PDF'
    value: ${{ steps.render.outputs.eu-doc-pdf-path }}
  compliance-report-pdf-path:
    description: 'Path to rendered compliance report PDF'
    value: ${{ steps.render.outputs.compliance-report-pdf-path }}
  rendered-files:
    description: 'Comma-separated list of all rendered PDF files'
    value: ${{ steps.render.outputs.rendered-files }}

runs:
  using: 'composite'
  steps:
    - name: 🐍 Install WeasyPrint
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2 > /dev/null 2>&1
        pip install --quiet weasyprint jinja2

    - name: 🖨️ Render PDFs
      id: render
      shell: bash
      run: |
        set -euo pipefail

        OUTPUT_DIR="${{ inputs.output-dir }}"
        mkdir -p "$OUTPUT_DIR"

        # ── Auto-detect product info ──
        PRODUCT_NAME="${{ inputs.product-name }}"
        if [ -z "$PRODUCT_NAME" ]; then
          PRODUCT_NAME="${GITHUB_REPOSITORY##*/}"
        fi

        PRODUCT_VERSION="${{ inputs.product-version }}"
        if [ -z "$PRODUCT_VERSION" ]; then
          if [ -n "${GITHUB_REF_NAME:-}" ] && [[ "$GITHUB_REF_NAME" =~ ^v?[0-9] ]]; then
            PRODUCT_VERSION="$GITHUB_REF_NAME"
          else
            PRODUCT_VERSION="${GITHUB_SHA:0:8}"
          fi
        fi

        SAFE_NAME=$(echo "$PRODUCT_NAME" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')

        # ── Create Python render script ──
        cat > _cra_render.py << 'PYEOF'
        import json
        import sys
        from pathlib import Path
        from html import escape

        from jinja2 import Template
        from weasyprint import HTML

        # ── Helpers ──

        def status_icon(val):
            if val in (True, "true"):
                return "✅"
            if val in (False, "false"):
                return "❌"
            return "⚠️"

        def score_color(score, max_score=100):
            pct = (score / max_score) * 100 if max_score else 0
            if pct >= 70:
                return "#166534", "#dcfce7"
            if pct >= 50:
                return "#92400e", "#fef3c7"
            return "#991b1b", "#fce7e7"

        # ── Shared CSS ──

        BASE_CSS = """
        @page {
            size: A4;
            margin: 20mm 15mm 25mm 15mm;
            @bottom-center {
                content: "Page " counter(page) " of " counter(pages);
                font-size: 8pt;
                color: #999;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DejaVu Sans', 'Liberation Sans', Arial, sans-serif;
            font-size: 10pt;
            line-height: 1.5;
            color: #1a1a1a;
        }
        .header {
            text-align: center;
            border-bottom: 3px solid #1e3a5f;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 18pt;
            color: #1e3a5f;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 10pt;
            color: #666;
        }
        .section {
            margin-bottom: 16px;
            page-break-inside: avoid;
        }
        .section-title {
            font-size: 11pt;
            font-weight: 700;
            color: #1e3a5f;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 9.5pt;
        }
        th, td {
            padding: 6px 10px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #1e3a5f;
        }
        .declaration-box {
            border: 2px solid #1e3a5f;
            padding: 16px;
            margin: 20px 0;
            background: #f8fafc;
        }
        .declaration-box p { font-style: italic; }
        .ce-mark {
            text-align: center;
            margin: 24px 0;
            font-size: 36pt;
            font-weight: 900;
            color: #1e3a5f;
            letter-spacing: 4px;
        }
        .sig-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 24px;
        }
        .sig-field {
            flex: 1;
            min-width: 200px;
        }
        .sig-field .line {
            border-bottom: 1px solid #333;
            min-height: 24px;
            padding-bottom: 4px;
        }
        .sig-field .label {
            font-size: 8pt;
            color: #666;
            margin-top: 4px;
        }
        .legal-notice {
            font-size: 8pt;
            color: #888;
            border-top: 1px solid #ddd;
            padding-top: 8px;
            margin-top: 20px;
        }
        .score-hero {
            text-align: center;
            padding: 20px;
            margin: 16px 0;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .score-hero .number {
            font-size: 36pt;
            font-weight: 800;
        }
        .score-hero .label {
            font-size: 10pt;
            color: #666;
        }
        .check { color: #166534; }
        .cross { color: #991b1b; }
        .warn { color: #92400e; }
        .footer-meta {
            font-size: 8pt;
            color: #888;
            border-top: 1px solid #ddd;
            padding-top: 6px;
            margin-top: 16px;
        }
        """

        # ── EU DoC Template ──

        EU_DOC_TEMPLATE = Template("""<!DOCTYPE html>
        <html lang="en">
        <head><meta charset="utf-8"><style>{{ css }}</style></head>
        <body>
        <div class="header">
            <h1>EU DECLARATION OF CONFORMITY</h1>
            <div class="subtitle">Pursuant to Annex V of Regulation (EU) 2024/2847 — Cyber Resilience Act</div>
        </div>
        <p style="text-align:center;font-size:10pt;color:#888;margin-bottom:20px;">No. {{ d.document.number }}</p>

        <div class="section">
            <div class="section-title">1. Product with digital elements</div>
            <table>
                <tr><th style="width:35%">Product Name</th><td>{{ d.product.name }}</td></tr>
                <tr><th>Product Type</th><td>{{ d.product.type }}</td></tr>
                <tr><th>Version</th><td>{{ d.product.version }}</td></tr>
                <tr><th>Unique Identification</th><td><code>{{ d.product.uniqueIdentification }}</code></td></tr>
                {% if d.product.description %}<tr><th>Description</th><td>{{ d.product.description }}</td></tr>{% endif %}
            </table>
        </div>

        <div class="section">
            <div class="section-title">2. Manufacturer</div>
            <table>
                <tr><th style="width:35%">Company</th><td>{{ d.manufacturer.name }}</td></tr>
                {% if d.manufacturer.address %}<tr><th>Address</th><td>{{ d.manufacturer.address }}</td></tr>{% endif %}
                <tr><th>Email</th><td>{{ d.manufacturer.email }}</td></tr>
                {% if d.manufacturer.website %}<tr><th>Website</th><td>{{ d.manufacturer.website }}</td></tr>{% endif %}
                <tr><th>Authorised Representative</th><td>{{ d.manufacturer.authorizedRepresentative or 'Not applicable' }}</td></tr>
            </table>
        </div>

        <div class="section">
            <div class="section-title">3. Declaration Statement</div>
            <div class="declaration-box"><p>{{ d.declaration.text }}</p></div>
        </div>

        <div class="section">
            <div class="section-title">4. Applicable Legislation</div>
            <table>
                <tr><th>Legislation</th><th>Reference</th></tr>
                {% for l in d.legislation %}<tr><td>{{ l.name }}</td><td>{{ l.reference }}</td></tr>{% endfor %}
            </table>
        </div>

        <div class="section">
            <div class="section-title">5. Harmonised Standards</div>
            <table>
                <tr><th>Standard</th><th>Description</th><th>Status</th></tr>
                {% for s in d.standards %}<tr><td>{{ s.id }}</td><td>{{ s.title }}</td><td>{{ s.status }}</td></tr>{% endfor %}
            </table>
        </div>

        <div class="section">
            <div class="section-title">6. Conformity Assessment</div>
            <table>
                <tr><th style="width:35%">Module</th><td>{{ d.conformityAssessment.moduleDisplay }}</td></tr>
                <tr><th>Notified Body</th><td>{{ d.conformityAssessment.notifiedBody or 'Not applicable (Module A)' }}</td></tr>
                <tr><th>Date</th><td>{{ d.conformityAssessment.date }}</td></tr>
            </table>
        </div>

        <div class="section">
            <div class="section-title">7. Product Classification &amp; Compliance</div>
            <table>
                <tr><th style="width:35%">CRA Category</th><td>{{ d.classification.categoryDisplay }}</td></tr>
                <tr><th>Compliance Score</th><td>{{ d.compliance.score }}/100</td></tr>
                <tr><th>SBOM Available</th><td>{{ si(d.compliance.sbom.generated) }} {{ d.compliance.sbom.format or '' }} ({{ d.compliance.sbom.components or 0 }} components)</td></tr>
                <tr><th>SBOM Signed</th><td>{{ si(d.compliance.sbom.signed) }} Cosign (Sigstore OIDC)</td></tr>
                <tr><th>Vulnerability Reporting</th><td>{{ d.compliance.vulnerabilityReporting }} / GitHub Security Advisories</td></tr>
            </table>
        </div>

        <div class="section">
            <div class="section-title">8. Support Period (Art. 13(8))</div>
            <table>
                <tr><th style="width:35%">Duration</th><td>{{ d.supportPeriod.years }} years</td></tr>
                <tr><th>Start</th><td>{{ d.supportPeriod.start }}</td></tr>
                <tr><th>End</th><td>{{ d.supportPeriod.end or 'TBD' }}</td></tr>
                <tr><th>Type</th><td>{{ d.supportPeriod.type }}</td></tr>
            </table>
        </div>

        <div class="ce-mark">CE</div>

        <div class="section">
            <div class="section-title">Signed for and on behalf of the manufacturer</div>
            <div class="sig-grid">
                <div class="sig-field"><div class="line">{{ d.declaration.place or '' }}</div><div class="label">Place</div></div>
                <div class="sig-field"><div class="line">{{ d.declaration.date }}</div><div class="label">Date</div></div>
                <div class="sig-field"><div class="line">{{ d.declaration.signedBy or '' }}</div><div class="label">Name</div></div>
                <div class="sig-field"><div class="line">{{ d.declaration.signatoryRole or '' }}</div><div class="label">Role / Title</div></div>
            </div>
        </div>

        <div class="legal-notice">
            This Declaration of Conformity is a legally binding document pursuant to Art. 28 of Regulation (EU) 2024/2847.
            Generated: {{ d.document.generatedAt }} | Schema: eu-doc/v{{ d.document.schemaVersion }}
        </div>
        </body></html>""")

        # ── Compliance Report Template ──

        COMPLIANCE_TEMPLATE = Template("""<!DOCTYPE html>
        <html lang="en">
        <head><meta charset="utf-8"><style>{{ css }}</style></head>
        <body>
        <div class="header">
            <h1>CRA Compliance Report</h1>
            <div class="subtitle">
                {{ d.product.name if d.product else '' }} {{ d.product.version if d.product else '' }}
                · Generated: {{ d.generatedAt or d.timestamp or '' }}
            </div>
        </div>

        {% set score = d.complianceScore.score if d.complianceScore else (d.compliance_score or 0) %}
        {% set max_score = d.complianceScore.maxScore if d.complianceScore else 100 %}
        <div class="score-hero">
            <div class="number" style="color: {{ sc(score)[0] }};">{{ score }}</div>
            <div class="label">out of {{ max_score }} · {{ 'PASS' if score >= 70 else 'FAIL' }}</div>
        </div>

        <div class="section">
            <div class="section-title">Compliance Checklist</div>
            <table>
                <tr><th>Check</th><th>Status</th><th>Details</th></tr>
                <tr><td>SBOM Generated</td><td>{{ si(d.sbom.generated if d.sbom else false) }}</td><td>{{ d.sbom.format if d.sbom else '' }}, {{ d.sbom.components if d.sbom else 0 }} components</td></tr>
                <tr><td>SBOM Signed (Cosign)</td><td>{{ si(d.signing.cosign if d.signing else false) }}</td><td>Sigstore keyless OIDC</td></tr>
                <tr><td>SBOM Attested (GitHub)</td><td>{{ si(d.signing.attestation if d.signing else false) }}</td><td>GitHub-native Sigstore</td></tr>
                <tr><td>Vulnerabilities</td>
                    <td>{{ '✅' if (d.vulnerabilities.critical if d.vulnerabilities else 0) == 0 and (d.vulnerabilities.high if d.vulnerabilities else 0) == 0 else '⚠️' }}</td>
                    <td>{{ d.vulnerabilities.critical if d.vulnerabilities else 0 }} critical, {{ d.vulnerabilities.high if d.vulnerabilities else 0 }} high, {{ d.vulnerabilities.medium if d.vulnerabilities else 0 }} medium</td>
                </tr>
                <tr><td>VEX Document</td><td>{{ si(d.vex.generated if d.vex else false) }}</td><td>{{ d.vex.totalStatements if d.vex else 0 }} statements</td></tr>
                <tr><td>Security Policy</td><td>{{ si(d.securityPolicy.present if d.securityPolicy else false) }}</td><td>{{ 'CVD process documented' if (d.securityPolicy.cvdProcess if d.securityPolicy else false) else 'SECURITY.md' }}</td></tr>
                <tr><td>Support Period</td><td>{{ si(d.supportPeriod.defined if d.supportPeriod else false) }}</td><td>{{ d.supportPeriod.years if d.supportPeriod else '?' }} years</td></tr>
            </table>
        </div>

        {% if d.craArticleMapping %}
        <div class="section">
            <div class="section-title">CRA Article Mapping</div>
            <table>
                <tr><th>Article</th><th>Requirement</th><th>Status</th></tr>
                {% for a in d.craArticleMapping %}
                <tr>
                    <td>{{ a.article }}</td>
                    <td>{{ a.requirement }}</td>
                    <td>
                        {% if a.status == 'met' %}<span class="check">✅ Met</span>
                        {% elif a.status == 'partial' %}<span class="warn">⚠️ Partial</span>
                        {% else %}<span class="cross">❌ Not met</span>{% endif %}
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
        {% endif %}

        <div class="footer-meta">
            Schema: compliance-report/v{{ d.schemaVersion or '1.0.0' }} |
            Generated by bauer-group/SEC-CRACompliance cra-render action
        </div>
        </body></html>""")

        # ── Main ──

        def render_pdf(template_type: str, json_path: str, output_path: str):
            with open(json_path) as f:
                data = json.load(f)

            templates = {
                "eu-doc": EU_DOC_TEMPLATE,
                "compliance-report": COMPLIANCE_TEMPLATE,
            }

            template = templates.get(template_type)
            if not template:
                print(f"❌ Unknown template: {template_type}", file=sys.stderr)
                sys.exit(1)

            html_str = template.render(d=data, css=BASE_CSS, si=status_icon, sc=score_color)
            HTML(string=html_str).write_pdf(output_path)
            print(f"✅ Rendered: {output_path}")

        if __name__ == "__main__":
            render_pdf(sys.argv[1], sys.argv[2], sys.argv[3])
        PYEOF

        # ── Render EU DoC ──
        EU_DOC_PATH="${{ inputs.eu-doc-path }}"
        EU_DOC_PDF=""
        RENDERED_FILES=""
        if [ -n "$EU_DOC_PATH" ] && [ -f "$EU_DOC_PATH" ]; then
          EU_DOC_PDF="${OUTPUT_DIR}/EU-Declaration-${SAFE_NAME}-${PRODUCT_VERSION}.pdf"
          echo "🖨️ Rendering EU Declaration of Conformity..."
          python3 _cra_render.py "eu-doc" "$EU_DOC_PATH" "$EU_DOC_PDF"
          RENDERED_FILES="${EU_DOC_PDF}"
        fi

        # ── Render Compliance Report ──
        REPORT_PATH="${{ inputs.compliance-report-path }}"
        REPORT_PDF=""
        if [ -n "$REPORT_PATH" ] && [ -f "$REPORT_PATH" ]; then
          REPORT_PDF="${OUTPUT_DIR}/CRA-Compliance-Report-${SAFE_NAME}-${PRODUCT_VERSION}.pdf"
          echo "🖨️ Rendering CRA Compliance Report..."
          python3 _cra_render.py "compliance-report" "$REPORT_PATH" "$REPORT_PDF"
          if [ -n "$RENDERED_FILES" ]; then
            RENDERED_FILES="${RENDERED_FILES},${REPORT_PDF}"
          else
            RENDERED_FILES="${REPORT_PDF}"
          fi
        fi

        # ── Cleanup ──
        rm -f _cra_render.py

        # ── Outputs ──
        echo "eu-doc-pdf-path=${EU_DOC_PDF}" >> "$GITHUB_OUTPUT"
        echo "compliance-report-pdf-path=${REPORT_PDF}" >> "$GITHUB_OUTPUT"
        echo "rendered-files=${RENDERED_FILES}" >> "$GITHUB_OUTPUT"

        echo "✅ PDF rendering complete"
        if [ -n "$EU_DOC_PDF" ]; then echo "   📄 ${EU_DOC_PDF}"; fi
        if [ -n "$REPORT_PDF" ]; then echo "   📄 ${REPORT_PDF}"; fi

        # ── Step Summary ──
        {
          echo "## 🖨️ CRA PDF Rendering"
          echo ""
          echo "| Document | File |"
          echo "|----------|------|"
          if [ -n "$EU_DOC_PDF" ]; then echo "| EU Declaration of Conformity | \`$(basename "$EU_DOC_PDF")\` |"; fi
          if [ -n "$REPORT_PDF" ]; then echo "| CRA Compliance Report | \`$(basename "$REPORT_PDF")\` |"; fi
        } >> "$GITHUB_STEP_SUMMARY"
