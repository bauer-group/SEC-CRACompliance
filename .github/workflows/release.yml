# =============================================================================
# Release – CRA Compliance Documentation
# =============================================================================
# Validates the VitePress documentation build (lint + build) and creates a
# semantic release on success.
#
# Triggered on push to main or manual dispatch.
#
# Pipeline: Validate (Node.js lint + build) → Semantic Release
# =============================================================================

name: 🚀 Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:
    inputs:
      force-release:
        description: 'force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Validation: Node.js Lint + Build
  # ---------------------------------------------------------------------------

  validate:
    name: 🔍 Validate Node.js Build
    uses: bauer-group/automation-templates/.github/workflows/nodejs-build.yml@main
    with:
      node-version-file: '.nvmrc'
      package-manager: 'npm'
      frozen-lockfile: true
      run-lint: true
      lint-command: 'npm run lint'
      build-command: 'npm run docs:build'
      run-tests: false
      run-audit: true
      audit-level: 'high'
      # Static docs site: every dependency is dev-only build tooling
      # (vitepress → vite → esbuild) — nothing ships to a runtime. Audit
      # production deps only, so the gate is not blocked by an unfixable
      # esbuild advisory in the build chain: the high gate trips on the Deno
      # install-time RCE GHSA-gv7w-rqvm-qjhr (fixed only in esbuild 0.28.1,
      # not yet bundled by any VitePress-compatible vite); the dev-server
      # SSRF GHSA-67mh-4wv8-2f99 is moderate and dev-only. The high
      # threshold still applies to any runtime dependency added later.
      audit-production-only: true
      upload-artifacts: false

  # ---------------------------------------------------------------------------
  # Semantic Release (only after successful validation)
  # ---------------------------------------------------------------------------

  release:
    name: 📦 Create Semantic Release
    needs: [validate]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.validate.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      dry-run: false
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit
