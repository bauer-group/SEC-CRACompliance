# =============================================================================
# CRA Reusable Workflow: Release (Repo-Local)
# =============================================================================
# Type 1 Workflow: Generates, signs, and archives CRA compliance artifacts
# as part of a release. All output stays in the executing repository.
#
# Artifacts produced:
#   - CycloneDX SBOM (signed with Cosign + GitHub Attestation)
#   - OpenVEX document (vulnerability exploitability)
#   - Vulnerability scan report (Trivy + optional Grype + OSV-Scanner)
#   - CRA Compliance Report (JSON + Markdown)
#   - SARIF upload to GitHub Security tab
#
# Optional: Node.js project validation (lint, build) before artifact generation.
# Inspired by bauer-group/Automation-Templates nodejs-build.yml.
#
# Usage (zero-config):
#   jobs:
#     cra-release:
#       uses: bauer-group/SEC-CRACompliance/.github/workflows/cra-release.yml@main
#       permissions:
#         contents: write
#         id-token: write
#         security-events: write
#
# Usage (with Node.js validation):
#   jobs:
#     cra-release:
#       uses: bauer-group/SEC-CRACompliance/.github/workflows/cra-release.yml@main
#       with:
#         run-validation: true
#         node-version: '24'
#         validation-command: 'npm run ci'
#       permissions:
#         contents: write
#         id-token: write
#         attestations: write
#         security-events: write
#
# CRA Reference: Art. 10 Abs. 12, Art. 13 Abs. 23, Annex I Part II
# =============================================================================

name: 📦 CRA Release

on:
  workflow_call:
    inputs:
      # -------------------------------------------------------------------
      # Validation (optional)
      # -------------------------------------------------------------------
      run-validation:
        description: 'Run project validation before generating CRA artifacts'
        type: boolean
        required: false
        default: false
      node-version:
        description: 'Node.js version for validation (requires run-validation: true)'
        type: string
        required: false
        default: '24'
      validation-command:
        description: 'Validation command (e.g., npm run ci, npm run validate)'
        type: string
        required: false
        default: 'npm run lint'

      # -------------------------------------------------------------------
      # SBOM & Scanning
      # -------------------------------------------------------------------
      scan-target:
        description: 'Target to scan (directory path or container image)'
        type: string
        required: false
        default: '.'
      scan-type:
        description: 'Scan type: fs, image, auto'
        type: string
        required: false
        default: 'auto'
      sbom-filename:
        description: 'SBOM output filename'
        type: string
        required: false
        default: 'sbom.cdx.json'
      sign-sbom:
        description: 'Sign SBOM with Cosign (requires id-token: write)'
        type: boolean
        required: false
        default: true
      fail-on-critical:
        description: 'Fail workflow if CRITICAL vulnerabilities found'
        type: boolean
        required: false
        default: false
      enable-grype:
        description: 'Run Grype as additional scan engine'
        type: boolean
        required: false
        default: false
      enable-osv:
        description: 'Run OSV-Scanner as additional scan engine'
        type: boolean
        required: false
        default: true

      # -------------------------------------------------------------------
      # Attestation, VEX & Compliance Report
      # -------------------------------------------------------------------
      attest-sbom:
        description: 'Create GitHub SBOM attestation (requires attestations: write)'
        type: boolean
        required: false
        default: true
      generate-vex:
        description: 'Generate OpenVEX document from scan results'
        type: boolean
        required: false
        default: true
      vex-overrides:
        description: 'Path to manual VEX triage overrides file'
        type: string
        required: false
        default: 'security/vex-overrides.json'
      generate-compliance-report:
        description: 'Generate CRA compliance report (JSON + Markdown)'
        type: boolean
        required: false
        default: true
      support-period-years:
        description: 'Product support period in years (Art. 13(8) CRA)'
        type: number
        required: false
        default: 5

      # -------------------------------------------------------------------
      # EU Declaration of Conformity & PDF Rendering
      # -------------------------------------------------------------------
      generate-eu-doc:
        description: 'Generate EU Declaration of Conformity (Annex V) as JSON'
        type: boolean
        required: false
        default: true
      render-pdfs:
        description: 'Render JSON artifacts to PDF (EU DoC + Compliance Report)'
        type: boolean
        required: false
        default: true
      classification:
        description: 'CRA product classification: standard, important-class-1, important-class-2, critical'
        type: string
        required: false
        default: 'standard'
      conformity-module:
        description: 'Conformity assessment module: module-a, module-b-c, module-h, eucc'
        type: string
        required: false
        default: 'module-a'
      manufacturer-name:
        description: 'Manufacturer legal name'
        type: string
        required: false
        default: 'BAUER GROUP GmbH'

      # -------------------------------------------------------------------
      # Release & Retention
      # -------------------------------------------------------------------
      upload-to-release:
        description: 'Attach artifacts to GitHub release (requires contents: write)'
        type: boolean
        required: false
        default: true
      retention-days:
        description: 'Artifact retention in days'
        type: number
        required: false
        default: 90

    outputs:
      sbom-path:
        description: 'Path to the generated SBOM'
        value: ${{ jobs.cra-release.outputs.sbom-path }}
      vulnerability-count:
        description: 'Total vulnerabilities found'
        value: ${{ jobs.cra-release.outputs.vulnerability-count }}
      critical-count:
        description: 'Critical vulnerabilities found'
        value: ${{ jobs.cra-release.outputs.critical-count }}
      sbom-signed:
        description: 'Whether SBOM was signed'
        value: ${{ jobs.cra-release.outputs.sbom-signed }}
      sbom-attested:
        description: 'Whether SBOM has GitHub attestation'
        value: ${{ jobs.cra-release.outputs.sbom-attested }}
      vex-path:
        description: 'Path to the generated VEX document'
        value: ${{ jobs.cra-release.outputs.vex-path }}
      compliance-score:
        description: 'CRA compliance score (0-100)'
        value: ${{ jobs.cra-release.outputs.compliance-score }}
      eu-doc-path:
        description: 'Path to the generated EU DoC JSON'
        value: ${{ jobs.cra-release.outputs.eu-doc-path }}

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------

permissions:
  contents: write
  id-token: write
  attestations: write
  security-events: write

# =============================================================================
# Jobs
# =============================================================================

jobs:
  # ---------------------------------------------------------------------------
  # Job: CRA Release Artifacts
  # ---------------------------------------------------------------------------
  cra-release:
    name: 📦 CRA Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      sbom-path: ${{ steps.sbom.outputs.sbom-path }}
      vulnerability-count: ${{ steps.scan.outputs.total-count }}
      critical-count: ${{ steps.scan.outputs.critical-count }}
      sbom-signed: ${{ steps.sign.outputs.signed }}
      sbom-attested: ${{ steps.attest.outputs.attested || 'false' }}
      vex-path: ${{ steps.vex.outputs.vex-path || '' }}
      compliance-score: ${{ steps.compliance-report.outputs.compliance-score || '' }}
      eu-doc-path: ${{ steps.eu-doc.outputs.eu-doc-path || '' }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      # ---- Optional: Node.js Validation ----

      - name: 📦 Setup Node.js
        if: inputs.run-validation
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: 📚 Install dependencies
        if: inputs.run-validation
        run: npm ci

      - name: 🔍 Validate project
        if: inputs.run-validation
        run: ${{ inputs.validation-command }}

      # ---- SBOM Generation ----

      - name: 📋 Generate SBOM
        id: sbom
        uses: bauer-group/SEC-CRACompliance/.github/actions/cra-sbom-generate@main
        with:
          scan-target: ${{ inputs.scan-target }}
          scan-type: ${{ inputs.scan-type }}
          output-file: ${{ inputs.sbom-filename }}

      # ---- SBOM Signing ----

      - name: 🔏 Sign SBOM
        id: sign
        if: inputs.sign-sbom
        uses: bauer-group/SEC-CRACompliance/.github/actions/cra-sbom-sign@main
        with:
          sbom-path: ${{ steps.sbom.outputs.sbom-path }}

      # ---- Vulnerability Scan ----

      - name: 🛡️ Vulnerability scan
        id: scan
        uses: bauer-group/SEC-CRACompliance/.github/actions/cra-vulnerability-scan@main
        with:
          scan-target: ${{ inputs.scan-target }}
          scan-type: ${{ inputs.scan-type }}
          fail-on-critical: ${{ inputs.fail-on-critical && 'true' || 'false' }}
          enable-grype: ${{ inputs.enable-grype && 'true' || 'false' }}
          enable-osv: ${{ inputs.enable-osv && 'true' || 'false' }}

      # ---- SBOM Attestation ----

      - name: 📜 Attest SBOM provenance
        id: attest
        if: inputs.attest-sbom && inputs.sign-sbom
        uses: bauer-group/automation-templates/.github/actions/sbom-attest@main
        with:
          sbom-path: ${{ steps.sbom.outputs.sbom-path }}

      # ---- VEX Generation ----

      - name: 📋 Generate OpenVEX document
        id: vex
        if: inputs.generate-vex
        uses: bauer-group/automation-templates/.github/actions/vex-generate@main
        with:
          vulnerability-report-path: ${{ steps.scan.outputs.report-path }}
          vex-overrides: ${{ inputs.vex-overrides }}
          product-id: 'pkg:github/${{ github.repository }}'

      # ---- CRA Compliance Report ----

      - name: 📊 Generate CRA compliance report
        id: compliance-report
        if: inputs.generate-compliance-report
        uses: bauer-group/SEC-CRACompliance/.github/actions/cra-compliance-report@main
        with:
          sbom-path: ${{ steps.sbom.outputs.sbom-path }}
          vulnerability-report-path: ${{ steps.scan.outputs.report-path }}
          vex-path: ${{ steps.vex.outputs.vex-path || 'vex.openvex.json' }}
          sbom-signed: ${{ steps.sign.outputs.signed || 'false' }}
          sbom-attested: ${{ steps.attest.outputs.attested || 'false' }}
          attestation-id: ${{ steps.attest.outputs.attestation-id || '' }}
          support-period-years: ${{ inputs.support-period-years }}

      # ---- EU Declaration of Conformity ----

      - name: 📜 Generate EU Declaration of Conformity
        id: eu-doc
        if: inputs.generate-eu-doc
        uses: bauer-group/SEC-CRACompliance/.github/actions/cra-eu-doc@main
        with:
          compliance-report-path: ${{ steps.compliance-report.outputs.json-report-path || 'cra-compliance-report.json' }}
          sbom-path: ${{ steps.sbom.outputs.sbom-path }}
          classification: ${{ inputs.classification }}
          conformity-module: ${{ inputs.conformity-module }}
          manufacturer-name: ${{ inputs.manufacturer-name }}
          support-period-years: ${{ inputs.support-period-years }}

      # ---- PDF Rendering ----

      - name: 🖨️ Render PDF documents
        id: render
        if: inputs.render-pdfs
        uses: bauer-group/SEC-CRACompliance/.github/actions/cra-render@main
        with:
          eu-doc-path: ${{ steps.eu-doc.outputs.eu-doc-path || '' }}
          compliance-report-path: ${{ steps.compliance-report.outputs.json-report-path || 'cra-compliance-report.json' }}

      # ---- Upload & Publish ----

      - name: 📤 Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif-path }}
        continue-on-error: true

      - name: 📦 Upload CRA artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cra-release-artifacts
          retention-days: ${{ inputs.retention-days }}
          path: |
            ${{ steps.sbom.outputs.sbom-path }}
            ${{ steps.sbom.outputs.sbom-path }}.sig
            ${{ steps.sbom.outputs.sbom-path }}.cert
            ${{ steps.scan.outputs.report-path }}
            ${{ steps.vex.outputs.vex-path }}
            cra-compliance-report.json
            cra-compliance-report.md
            eu-doc.json
            cra-rendered/*.pdf

      - name: 📎 Attach to GitHub Release
        if: inputs.upload-to-release && github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SBOM="${{ steps.sbom.outputs.sbom-path }}"

          echo "Attaching CRA artifacts to release ${TAG}"

          # SBOM
          gh release upload "$TAG" "$SBOM" --clobber

          # Signature + Certificate (if signed)
          if [ -f "${SBOM}.sig" ]; then
            gh release upload "$TAG" "${SBOM}.sig" --clobber
            gh release upload "$TAG" "${SBOM}.cert" --clobber
          fi

          # Vulnerability report
          VULN_REPORT="${{ steps.scan.outputs.report-path }}"
          if [ -f "$VULN_REPORT" ]; then
            gh release upload "$TAG" "$VULN_REPORT" --clobber
          fi

          # VEX document
          VEX_FILE="${{ steps.vex.outputs.vex-path }}"
          if [ -n "$VEX_FILE" ] && [ -f "$VEX_FILE" ]; then
            gh release upload "$TAG" "$VEX_FILE" --clobber
          fi

          # Compliance report
          if [ -f "cra-compliance-report.json" ]; then
            gh release upload "$TAG" "cra-compliance-report.json" --clobber
            gh release upload "$TAG" "cra-compliance-report.md" --clobber
          fi

          # EU Declaration of Conformity
          EU_DOC="${{ steps.eu-doc.outputs.eu-doc-path }}"
          if [ -n "$EU_DOC" ] && [ -f "$EU_DOC" ]; then
            gh release upload "$TAG" "$EU_DOC" --clobber
          fi

          # Rendered PDFs
          for PDF in cra-rendered/*.pdf; do
            if [ -f "$PDF" ]; then
              gh release upload "$TAG" "$PDF" --clobber
            fi
          done

      # ---- Summary ----

      - name: 📊 Generate summary
        if: always()
        shell: bash
        run: |
          echo "## 📦 CRA Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM (${{ inputs.sbom-filename }}) | ${{ steps.sbom.outputs.component-count }} components |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM Signed | ${{ steps.sign.outputs.signed || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM Attested | ${{ steps.attest.outputs.attested || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Vulnerabilities | ${{ steps.scan.outputs.total-count }} total (${{ steps.scan.outputs.critical-count }} critical) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| VEX Document | ${{ steps.vex.outputs.total-statements || 'skipped' }} statements |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Compliance Score | ${{ steps.compliance-report.outputs.compliance-score || 'skipped' }}/100 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| EU Declaration | ${{ steps.eu-doc.outputs.doc-number || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PDF Documents | ${{ steps.render.outputs.rendered-files || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project Type | ${{ steps.sbom.outputs.project-type }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.run-validation }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Validation:** \`${{ inputs.validation-command }}\` ✅" >> "$GITHUB_STEP_SUMMARY"
          fi
